<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ongoing Matches – SLCRICKPRO</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;700&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="../css/main.css" />
    <link rel="icon" type="image/png" href="../assets/logo.png" />
    <link rel="stylesheet" href="../css/ongoing.css" />
</head>

<body class="page-wrapper">
    <div class="bg-canvas">
        <div class="bg-orb orb1"></div>
        <div class="bg-orb orb2"></div>
    </div>

    <div class="sub-header" style="justify-content: flex-start; gap: 20px;">
        <a href="../index.html" class="back-btn">
            <svg viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
            Back
        </a>
        <div class="logo">
          <div class="logo-icon">🏏</div>
          <div class="logo-text-animated">
            <span class="logo-name-animated">SLCRICK<span class="pro">PRO</span></span>
          </div>
        </div>
        <div class="header-right-group">
            <button class="btn btn-sm btn-ghost" onclick="refreshAll()">🔄 Refresh</button>
            <div class="live-badge" style="font-size:12px;padding:5px 14px;">
                <span class="live-dot"></span> LIVE
            </div>
        </div>
    </div>

    <!-- Tabs -->
    <div class="content-container">
        <div class="tab-bar" style="max-width:600px">
            <button class="tab-btn active" id="tab-live" onclick="switchTab('live')">Live Matches</button>
            <button class="tab-btn" id="tab-tournament" onclick="switchTab('tournament')">Tournament</button>
            <button class="tab-btn" id="tab-recent" onclick="switchTab('recent')">Completed</button>
        </div>

        <!-- LIVE MATCHES -->
        <div id="panel-live">
            <div id="live-matches-grid" class="matches-grid"></div>
        </div>

        <!-- TOURNAMENT PANEL -->
        <div id="panel-tournament" style="display:none">
            <div class="tournament-header-flex">
                <div class="section-hd">Current Tournament</div>
                <div class="sub-tab-bar" id="tourn-subtabs" style="display:none">
                    <button class="sub-tab-btn active" id="subtab-standings" onclick="switchTournSubTab('standings')">Standings</button>
                    <button class="sub-tab-btn" id="subtab-bracket" onclick="switchTournSubTab('bracket')">Knockout Bracket</button>
                    <button class="sub-tab-btn" id="subtab-matches" onclick="switchTournSubTab('matches')">Full Schedule</button>
                </div>
            </div>
            <div id="tournament-selector" class="tournament-selector-row"></div>
            <div id="tournament-view-tabs" class="tab-bar" style="display:none;max-width:640px;margin-top:12px">
                <button type="button" class="tab-btn active" id="tvt-matches" onclick="switchTournamentPageView('matches')">Matches &amp; stats</button>
                <button type="button" class="tab-btn" id="tvt-squads" onclick="switchTournamentPageView('squads')">Team squads</button>
            </div>
            <div id="tournament-schedule-block">
                <div id="tournament-details" class="table-container"></div>
                <div id="tournament-bracket" class="bracket-container" style="display:none"></div>
                <div id="tournament-full-schedule" class="matches-grid" style="display:none"></div>
            </div>
            <div id="tournament-squads-panel" class="table-container" style="display:none"></div>
        </div>

        <!-- COMPLETED -->
        <div id="panel-recent" style="display:none">
            <div id="recent-matches-grid" class="matches-grid"></div>
        </div>
    </div>

    <div class="modal-overlay" id="match-detail-modal" style="display:none" onclick="closeMatchDetail(event)">
        <div class="modal-box" style="max-width:700px;width:100%" onclick="event.stopPropagation()">
            <div class="scorecard-close-btn" onclick="closeMatchDetail()">✕</div>
            <div id="match-detail-content"></div>
        </div>
    </div>

    <!-- Stats Card Modal -->
    <div class="modal-overlay" id="stats-card-modal" style="display:none" onclick="document.getElementById('stats-card-modal').style.display='none'">
        <div class="modal-box" style="max-width:400px;width:90%;text-align:center;padding:30px" onclick="event.stopPropagation()">
            <div style="font-size:24px;margin-bottom:15px">✨ Player Stats Card</div>
            <div style="font-size:14px;color:rgba(255,255,255,0.6);margin-bottom:25px">Upload a professional photo for <b id="stats-player-name" style="color:#fff"></b> to generate a premium summary.</div>
            
            <input type="file" id="player-photo-input" accept="image/*" style="display:none" onchange="handlePlayerPhotoSelect(event)">
            <button class="btn btn-primary btn-full" onclick="document.getElementById('player-photo-input').click()">📁 Select Photo</button>
            <div id="photo-preview-container" style="margin-top:20px;display:none">
                <img id="photo-preview" style="width:100px;height:100px;border-radius:50%;object-fit:cover;border:2px solid #ffc107">
                <button class="btn btn-amber btn-full" style="margin-top:15px" onclick="generateFinalStatsCard()">🚀 Generate Card</button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="../js/db.js?v=2"></script>
    <script src="../js/ongoing.js?v=2"></script>
</body>

</html>
