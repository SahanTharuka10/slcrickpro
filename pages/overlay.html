<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Live TV Overlay</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../css/overlay.css" />
    <link rel="stylesheet" href="../css/tv-performance.css" />
    <link rel="stylesheet" href="../css/ongoing.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        .tv-controls {
            position: fixed;
            bottom: 15px;
            left: 20px;
            z-index: 10000;
        }
        .btn-tv-main {
            background: #e61b4d;
            color: #fff;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(230,27,77,0.4);
            transition: transform 0.2s;
            font-family: inherit;
        }
        .btn-tv-main:hover { transform: scale(1.05); }
        .shortcut-menu {
            position: fixed;
            bottom: 60px;
            left: 20px;
            background: rgba(0,0,0,0.9);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 8px;
            display: flex;
            flex-direction: column;
            gap: 4px;
            z-index: 10000;
            backdrop-filter: blur(10px);
            animation: slideUp 0.3s ease;
        }
        @keyframes slideUp {
            from { transform: translateY(10px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .shortcut-menu .btn-tv {
            background: transparent;
            color: #fff;
            border: none;
            padding: 10px 16px;
            border-radius: 8px;
            font-size: 13px;
            cursor: pointer;
            text-align: left;
            transition: background 0.2s;
            font-family: inherit;
            white-space: nowrap;
        }
        .shortcut-menu .btn-tv:hover { background: rgba(255,255,255,0.1); }
        .overlay-popup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80%;
            max-width: 600px;
            max-height: 80vh;
            overflow-y: auto;
            background: rgba(0, 0, 0, 0.85);
            color: #fff;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            z-index: 9998;
            display: none;
        }
        .side-player-popup {
            position: fixed;
            right: 50px;
            bottom: 120px;
            width: 320px;
            background: linear-gradient(135deg, #1b1642 0%, #292265 100%);
            color: #fff;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            z-index: 9997;
            display: none;
            border: 2px solid #e61b4d;
            font-family: 'Outfit', sans-serif;
            animation: slideInRight 0.3s ease forwards;
        }
        @keyframes slideInRight {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        .player-row-clickable {
            cursor: pointer;
            transition: background 0.2s;
        }
        .player-row-clickable:hover {
            background: rgba(0,0,0,0.1);
        }

        /* BROADCAST OVERLAYS */
        .broadcast-overlay {
            position: fixed;
            z-index: 11000;
            display: none;
            font-family: 'Outfit', sans-serif;
        }

        /* Runs Needed Cinematic Artwork */
        .runs-balls-overlay {
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            z-index: 12000;
        }
        .rb-artwork-inner {
            position: relative;
            width: 800px;
            height: 220px;
            background: linear-gradient(135deg, #1a237e 0%, #7b1fa2 100%);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8), 0 0 100px rgba(123,31,162,0.4);
            border: 4px solid rgba(255,255,255,0.1);
            overflow: hidden;
            transform: scale(0.8);
        }
        .rb-artwork-inner::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: repeating-linear-gradient(0deg, rgba(255,255,255,0.03) 0px, rgba(255,255,255,0.03) 1px, transparent 1px, transparent 2px);
            pointer-events: none;
        }
        .rb-content { text-align: center; color: #fff; position: relative; z-index: 2; }
        .rb-title { 
            font-size: 24px; font-weight: 900; letter-spacing: 12px; margin-bottom: 5px; 
            color: #ffd600; text-shadow: 0 0 20px rgba(255,214,0,0.5);
        }
        .rb-main { font-size: 80px; font-weight: 900; line-height: 1; display: flex; align-items: baseline; gap: 20px; }
        .rb-main span { color: #fff; text-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .rb-main b { font-size: 32px; font-weight: 600; text-transform: uppercase; color: rgba(255,255,255,0.6); }
        .rb-footer { font-size: 14px; font-weight: 700; margin-top: 15px; opacity: 0.5; letter-spacing: 4px; }
        
        .rb-decor {
            position: absolute; top: -50px; right: -50px; width: 200px; height: 300px;
            background: rgba(255,255,255,0.05); transform: rotate(15deg);
        }

        /* Current Run Rate Graphic */
        .crr-overlay {
            bottom: 40px;
            right: 40px;
            width: 220px;
            height: 90px;
            background: linear-gradient(135deg, #00c853 0%, #00e676 100%);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #fff;
            box-shadow: 0 10px 30px rgba(0, 200, 83, 0.4);
            border: 2px solid rgba(255,255,255,0.2);
            transform: translateX(300px); /* For GSAP */
        }
        .crr-label { font-size: 14px; font-weight: 800; opacity: 0.8; letter-spacing: 2px; }
        .crr-val { font-size: 36px; font-weight: 900; }

        .next-match-overlay {
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transform: scale(1.1);
        }
        .nm-artwork {
            width: 1000px;
            height: 500px;
            background: linear-gradient(45deg, #1b1642 0%, #292265 100%);
            border-radius: 40px;
            border: 4px solid #e61b4d;
            box-shadow: 0 50px 150px rgba(0,0,0,1), 0 0 50px rgba(230,27,77,0.3);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }
        .nm-glow { position: absolute; top:-50%; left:-50%; width:200%; height:200%; background: radial-gradient(circle, rgba(230,27,77,0.1) 0%, transparent 70%); animation: rotate 10s linear infinite; }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        
        .nm-tag { background: #e61b4d; color: #fff; padding: 10px 40px; border-radius: 40px; font-size: 20px; font-weight: 900; letter-spacing: 5px; margin-bottom: 60px; z-index: 2; }
        .nm-teams { display: flex; align-items: center; gap: 60px; z-index: 2; }
        .nm-team { font-size: 72px; font-weight: 900; color: #fff; text-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .nm-vs-circle { width: 100px; height: 100px; background: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #e61b4d; font-size: 40px; font-weight: 900; font-style: italic; box-shadow: 0 0 30px rgba(255,255,255,0.4); }
        .nm-footer { margin-top: 60px; color: #aaa; font-size: 14px; letter-spacing: 4px; z-index: 2; font-weight: 600; }

        /* Full Scorecard (Balanced Columns) */
        .full-scorecard-overlay {
            top: 20px; left: 20px; right: 20px; bottom: 20px;
            background: #fdfdfd; 
            color: #111;
            padding: 30px;
            display: flex;
            flex-direction: column;
        }
        .fs-header { text-align: center; margin-bottom: 20px; background: #1b1642; color: #fff; padding: 15px; border-radius: 12px; }
        .fs-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; flex: 1; min-height: 0; }
        .fs-column { display: flex; flex-direction: column; gap: 15px; }

        /* Summary Sheet (Proper Sheet Look) */
        .summary-overlay {
            top: 40px; left: 40px; right: 40px; bottom: 40px;
            background: #fff;
            background-image: radial-gradient(#ddd 1px, transparent 1px);
            background-size: 20px 20px;
            color: #111;
            border: 20px solid #1b1642;
            padding: 40px;
            box-shadow: 0 50px 150px rgba(0,0,0,1);
        }
        .sm-header { border-bottom: 5px double #1b1642; padding-bottom: 20px; margin-bottom: 30px; text-align: center; }
        .sm-title { font-size: 48px; font-weight: 900; color: #1b1642; margin: 0; }
        .sm-subtitle { font-size: 18px; color: #e61b4d; font-weight: 800; letter-spacing: 3px; }
    </style>
</head>

<body>
    <!-- Menu removed as per request -->
    <div id="side-player-popup" class="side-player-popup"></div>
    <div id="overlay-popup" class="overlay-popup"></div>
    <div id="overlay-container" class="overlay-container">
        <!-- Inner overlay injected by JS -->
    </div>


    <!-- BROADCAST OVERLAYS -->
    <div id="broadcast-runs-balls" class="broadcast-overlay runs-balls-overlay">
        <div class="rb-artwork-inner" id="rb-inner">
            <div class="rb-decor"></div>
            <div class="rb-content">
                <div class="rb-title" id="rb-title-anim">RUNS NEEDED</div>
                <div class="rb-main">
                    <span id="rb-runs">0</span>
                    <b>from</b>
                    <span id="rb-balls">0</span>
                    <b>balls</b>
                </div>
                <div class="rb-footer">SLCRICKPRO LIVE BROADCAST PRODUCTION</div>
            </div>
        </div>
    </div>

    <div id="broadcast-next-match" class="broadcast-overlay next-match-overlay">
        <div class="nm-artwork">
            <div class="nm-glow"></div>
            <div class="nm-tag">COMING UP NEXT</div>
            <div class="nm-teams">
                <div class="nm-team" id="nm-team-a">TEAM ALPHA</div>
                <div class="nm-vs-circle">VS</div>
                <div class="nm-team" id="nm-team-b">TEAM BETA</div>
            </div>
            <div class="nm-footer">SLCRICKPRO LIVE BROADCAST PRODUCTION</div>
        </div>
    </div>

    <!-- NEW CRR GRAPHIC -->
    <div id="broadcast-crr" class="broadcast-overlay crr-overlay">
        <div class="crr-label">CURRENT RR</div>
        <div class="crr-val" id="crr-val">0.00</div>
    </div>

    <!-- Milestone Overlay -->
    <div id="milestone-overlay" class="broadcast-overlay">
        <div class="ms-title">MILESTONE REACHED</div>
        <div id="ms-val" class="ms-val">50</div>
        <div id="ms-sub" class="ms-sub">RUNS OFF 30 BALLS</div>
    </div>

    <div id="broadcast-full-scorecard" class="broadcast-overlay full-scorecard-overlay">
        <div id="fs-content" style="height:100%; display:flex; flex-direction:column">
            <!-- Balanaced Scorecard Injected -->
        </div>
    </div>

    <div id="broadcast-summary" class="broadcast-overlay summary-overlay">
        <div id="sm-content">
            <!-- Proper Summary Sheet Injected -->
        </div>
    </div>

    <script src="../js/db.js"></script>
    <script src="../js/overlay.js"></script>
</body>

</html>
