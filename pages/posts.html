<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Community Posts – SLCRICKPRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/main.css">
    <style>
        .posts-container {
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
        }
        .post-card {
            background: var(--c-surface);
            border: 1px solid var(--c-border);
            border-radius: var(--r-sm);
            padding: 24px;
            margin-bottom: 24px;
            position: relative;
            overflow: hidden;
            transition: transform 0.3s ease;
        }
        .post-card:hover { transform: translateY(-4px); }
        .post-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .post-author {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 700;
            color: var(--c-amber);
        }
        .post-date {
            font-size: 12px;
            color: var(--c-muted);
        }
        .post-content {
            font-size: 16px;
            line-height: 1.6;
            color: var(--c-text);
            white-space: pre-wrap;
        }
        .create-post-card {
            background: linear-gradient(145deg, rgba(233, 30, 99, 0.1), rgba(156, 39, 176, 0.05));
            border: 1px dashed rgba(233, 30, 99, 0.3);
            border-radius: var(--r-sm);
            padding: 24px;
            margin-bottom: 40px;
            text-align: center;
        }
        .create-post-title {
            font-size: 20px;
            font-weight: 800;
            margin-bottom: 16px;
            color: #f06292;
        }
    </style>
</head>
<body class="page-wrapper">
    <div class="bg-canvas"></div>

    <div class="sub-header">
        <a href="/" class="back-btn">
            <svg viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
            Back
        </a>
        <div class="logo">
            <div class="logo-icon">📝</div>
            <div class="logo-text-animated">
                <span class="logo-name-animated">COMMUNITY <span class="pro">POSTS</span></span>
            </div>
        </div>
        <button class="theme-toggle" onclick="toggleTheme()">☀️</button>
    </div>

    <main class="posts-container">
        <div id="posts-list">
            <!-- Posts will be rendered here -->
            <div class="empty-state">Loading posts...</div>
        </div>
    </main>

    <div class="toast" id="toast"></div>

    <script src="/js/db.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            renderPosts();
        });

        async function renderPosts() {
            const list = document.getElementById('posts-list');
            try {
                const r = await fetch(BACKEND_BASE_URL + '/sync/posts');
                const posts = await r.json();

                if (!posts || !posts.length) {
                    list.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-state-icon">📭</div>
                            <div class="empty-state-title">No posts yet</div>
                            <p>Check back later for official updates!</p>
                        </div>
                    `;
                    return;
                }

                list.innerHTML = posts.map(p => `
                    <div class="post-card">
                        <div class="post-header">
                            <div class="post-author">🛡️ Admin</div>
                            <div class="post-date">${timeSince(p.createdAt)}</div>
                        </div>
                        <h3 style="margin-bottom:10px; color:var(--c-primary); font-size:18px">${escapeHTML(p.title || 'Official Update')}</h3>
                        ${p.image ? `<img src="${p.image}" style="width:100%; max-height:400px; object-fit:cover; border-radius:12px; margin-bottom:15px; border:1px solid var(--c-border)" />` : ''}
                        <div class="post-content">${escapeHTML(p.content)}</div>
                    </div>
                `).join('');
            } catch (e) {
                list.innerHTML = '<div class="empty-state">Failed to load posts.</div>';
            }
        }
    </script>
</body>
</html>
